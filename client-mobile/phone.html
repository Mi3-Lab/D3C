<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>D3C / Fleet Node</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body class="app-body">

  <header class="topbar">
    <div class="topbar-left">
      <span class="topbar-logo">D3C</span>
      <span class="topbar-title">Fleet Node</span>
    </div>
    <div class="topbar-right">
      <button id="disconnectBtn" class="btn btn-alt btn-small">Disconnect</button>
    </div>
  </header>

  <main class="phone-main">
    <div class="phone-stack">

      <section class="card phone-join-card">
        <h2>Join Session</h2>
        <div class="phone-join-grid">
          <label>Device Name
            <input id="deviceNameInput" type="text" maxlength="40" placeholder="e.g. Alex iPhone" />
          </label>
          <label>Join Code
            <input id="joinCodeInput" type="text" maxlength="6" placeholder="e.g. A1B2C3" />
            <small class="muted">Get this from the D3C Dashboard</small>
          </label>
        </div>
        <div id="joinValidation" class="phone-validation-message"></div>
        <div id="joinStatus" class="muted mono phone-join-status">Waiting for join details</div>
      </section>

      <section id="deviceIdentityCard" class="card phone-device-info">
        <span class="label">Connected as</span>
        <span id="deviceIdentityName" class="device-name">-</span>
        <span id="deviceIdentityType" class="device-type">Phone</span>
      </section>

      <section class="card phone-action-card">
        <div id="primaryActionArea">
          <button id="startBtn" class="btn primary large phone-primary-btn">Start Device</button>
        </div>
      </section>

      <section class="card phone-status-card">
        <div class="status-summary">
          <div>
            <h2>Device Status</h2>
            <div id="phoneReadySummary" class="progress muted">Waiting for setup</div>
          </div>
          <div id="phoneReadyMissing" class="phone-ready-missing muted"></div>
        </div>
        <ul id="phoneReadinessList" class="checklist"></ul>
      </section>

      <section class="card camera-section">
        <div class="section-header phone-camera-header">
          <h2>Camera</h2>
          <div class="row">
            <button id="cameraFlipBtn" class="btn btn-alt btn-small">Flip</button>
          </div>
        </div>
        <div class="camera-preview">
          <video id="preview" playsinline autoplay muted></video>
          <div class="preview-overlay">
            <span id="cameraPreviewBadge" class="badge">OFF</span>
            <span id="cameraPreviewFps" class="fps">0 FPS</span>
          </div>
        </div>
        <div id="cameraPreviewMeta" class="stream-stats">
          <span>Camera off</span>
        </div>
      </section>

    </div>
  </main>

  <div id="connStatus" class="phone-hidden-status">Disconnected</div>
  <script src="/phone.js"></script>
</body>
</html>

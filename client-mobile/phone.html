<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>D3C / Fleet Node</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <main class="phone-wrap">
    <div class="row">
      <h1>D3C Fleet Node</h1>
      <button id="phoneThemeToggleBtn" class="btn btn-alt">Dark Mode</button>
    </div>
    <p class="muted">Tap start once to grant iOS permissions.</p>
    <button id="startBtn" class="btn">Start</button>
    <div id="connStatus" class="pill">Disconnected</div>
    <div id="deviceIdPill" class="pill">device: -</div>

    <section class="card">
      <h2>Module Status</h2>
      <ul id="statusList"></ul>
    </section>

    <section class="card">
      <h2>Camera Preview</h2>
      <video id="preview" playsinline autoplay muted></video>
    </section>
  </main>
  <script src="/phone.js"></script>
</body>
</html>

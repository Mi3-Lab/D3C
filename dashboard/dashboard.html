<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>D3C / Fleet Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body class="app-body">

  <header class="topbar">
    <div class="topbar-left">
      <span class="topbar-logo">D3C</span>
      <span class="topbar-title">Fleet Dashboard</span>
    </div>
    <div class="status-bar" id="globalStatusBar" aria-label="Global status">
      <div class="status-item" id="statusSystem">
        <span class="indicator gray"></span>
        <span class="status-text">System Ready</span>
      </div>
      <div class="status-item" id="statusConn">
        <span class="indicator gray"></span>
        <span class="status-text">Connected</span>
      </div>
      <div class="status-item" id="statusDevices">
        <span class="status-text">0/0 Devices</span>
      </div>
      <div class="status-item" id="statusRec">
        <span class="indicator gray"></span>
        <span class="status-text">Idle</span>
      </div>
    </div>
    <div class="topbar-right">
      <button id="logoutBtn" class="btn btn-alt btn-small">Log Out</button>
    </div>
  </header>

  <details class="workspace-bar" id="advancedLayoutPanel">
    <summary class="workspace-bar-summary">
      <span class="workspace-bar-label">Workspace</span>
      <div class="workspace-bar-controls" onclick="event.stopPropagation()">
        <label>Layout <select id="layoutSelect"></select></label>
        <label>Preset
          <select id="layoutPresetSelect">
            <option value="">—</option>
            <option value="Overview">Overview</option>
            <option value="Cameras">Cameras</option>
            <option value="Review">Review</option>
          </select>
        </label>
        <button id="editLayoutBtn" class="btn btn-alt btn-small">Edit</button>
        <label>Name <input id="layoutNameInput" type="text" placeholder="e.g. Demo" /></label>
        <button id="saveLayoutBtn" class="btn btn-small">Save</button>
        <button id="deleteLayoutBtn" class="btn btn-alt btn-small">Delete</button>
        <button id="exportLayoutBtn" class="btn btn-alt btn-small">Export</button>
        <label class="file-label">Import <input id="importLayoutFile" type="file" accept="application/json" /></label>
      </div>
    </summary>
    <div class="workspace-bar-edit edit-row" id="editToolsRow">
      <label>Add Widget <select id="addWidgetSelect"></select></label>
      <button id="addWidgetBtn" class="btn btn-small">Add</button>
      <span class="muted mono">Drag headers to move · Resize from corner</span>
    </div>
  </details>

  <main class="widget-area">
    <section id="widgetGrid" class="widget-grid"></section>
  </main>

  <script type="module" src="/dashboard.js"></script>
</body>
</html>

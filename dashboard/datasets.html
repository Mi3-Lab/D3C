<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>D3C / View Outputs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Manrope:wght@400;500;600;700&display=swap" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body class="app-body dashboard-body datasets-page">
  <header class="topbar">
    <div class="topbar-left">
      <div class="brand-lockup">
        <span class="topbar-logo">D3C</span>
        <div class="topbar-copy">
          <span class="topbar-kicker">Distributed Driving Data Collective</span>
          <span class="topbar-title">View Outputs</span>
        </div>
      </div>
      <nav class="topbar-nav" aria-label="Dashboard sections">
        <a class="topbar-link" href="/dashboard">Live</a>
        <a class="topbar-link is-active" href="/dashboard/datasets">View Outputs</a>
      </nav>
    </div>
    <div class="topbar-right">
      <button id="refreshDatasetsBtn" class="btn btn-small">Refresh</button>
      <button id="logoutBtn" class="btn btn-alt btn-small">Log Out</button>
    </div>
  </header>

  <main class="dashboard-main datasets-page-main">
    <section class="dashboard-hero datasets-hero">
      <div class="dashboard-hero-copy">
        <h1>View Outputs</h1>
      </div>
    </section>

    <section id="datasetsOverviewGrid" class="datasets-overview-grid" aria-label="Dataset overview"></section>

    <section class="datasets-shell">
      <aside class="card datasets-sidebar">
        <div class="datasets-sidebar-head">
          <div class="datasets-sidebar-copy">
            <h2>Sessions</h2>
          </div>
          <div class="datasets-sidebar-tools">
            <label class="datasets-filter-label">
              <span class="datasets-field-label">Search</span>
              <input id="datasetsFilterInput" type="text" placeholder="Search" aria-label="Search sessions" />
            </label>
            <label class="datasets-sort-label">
              <span class="datasets-field-label">Sort</span>
              <select id="datasetsSortSelect" aria-label="Sort sessions">
                <option value="updated_desc">Newest</option>
                <option value="updated_asc">Oldest</option>
                <option value="name_asc">A-Z</option>
                <option value="name_desc">Z-A</option>
                <option value="size_desc">Largest</option>
                <option value="duration_desc">Longest</option>
              </select>
            </label>
          </div>
        </div>
        <div id="datasetsList" class="datasets-list"></div>
      </aside>

      <section class="card datasets-detail">
        <div id="datasetsDetail"></div>
      </section>
    </section>
  </main>

  <div id="datasetsActionModal" class="phone-modal datasets-modal" hidden>
    <div class="phone-modal-backdrop" data-modal-close></div>
    <div class="phone-modal-dialog datasets-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="datasetsModalTitle">
      <div class="phone-modal-head">
        <h2 id="datasetsModalTitle">Action</h2>
        <p id="datasetsModalCopy" class="phone-modal-copy"></p>
      </div>
      <div class="phone-modal-actions datasets-modal-actions">
        <button id="datasetsModalCancel" type="button" class="btn btn-alt">Cancel</button>
        <button id="datasetsModalConfirm" type="button" class="btn">Confirm</button>
      </div>
    </div>
  </div>

  <script type="module" src="/dashboard-datasets.js"></script>
</body>
</html>

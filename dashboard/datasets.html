<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>D3C / Datasets</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Manrope:wght@400;500;600;700&display=swap" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body class="app-body dashboard-body datasets-page">
  <header class="topbar">
    <div class="topbar-left">
      <div class="brand-lockup">
        <span class="topbar-logo">D3C</span>
        <div class="topbar-copy">
          <span class="topbar-kicker">Distributed Driving Data Collective</span>
          <span class="topbar-title">Datasets</span>
        </div>
      </div>
      <nav class="topbar-nav" aria-label="Dashboard sections">
        <a class="topbar-link" href="/dashboard">Live</a>
        <a class="topbar-link is-active" href="/dashboard/datasets">Datasets</a>
      </nav>
    </div>
    <div class="topbar-right">
      <span id="datasetsRefreshStatus" class="topbar-note">5s auto</span>
      <button id="logoutBtn" class="btn btn-alt btn-small">Log Out</button>
    </div>
  </header>

  <main class="dashboard-main datasets-page-main">
    <section class="dashboard-hero datasets-hero">
      <div class="dashboard-hero-copy">
        <h1>Datasets</h1>
      </div>
      <div class="datasets-hero-actions">
        <button id="refreshDatasetsBtn" class="btn btn-small">Refresh</button>
      </div>
    </section>

    <section id="datasetsOverviewGrid" class="datasets-overview-grid" aria-label="Dataset overview"></section>

    <section class="datasets-shell">
      <aside class="card datasets-sidebar">
        <div class="datasets-sidebar-head">
          <div class="datasets-sidebar-copy">
            <h2>Sessions</h2>
          </div>
          <label class="datasets-filter-label">
            <input id="datasetsFilterInput" type="text" placeholder="Search" aria-label="Search sessions" />
          </label>
        </div>
        <div id="datasetsList" class="datasets-list"></div>
      </aside>

      <section class="card datasets-detail">
        <div id="datasetsDetail"></div>
      </section>
    </section>
  </main>

  <script type="module" src="/dashboard-datasets.js"></script>
</body>
</html>
